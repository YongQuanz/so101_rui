<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SO-101 RUI</title>
    <link rel="stylesheet" href="styles/dashboard.css" />
    <script type="module" src="src/main.js"></script>
  </head>
  <body>
    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <div class="brand">
        <span class="brand-name">SO-101</span>
        <span class="brand-tag">Robot User Interface (RUI)</span>
      </div>

      <!-- Connection panel -->
      <section class="panel" id="panel-connection">
        <h2 class="panel-title">Connection</h2>

        <label class="field-label" for="ws-url">rosbridge URL</label>
        <input type="text" id="ws-url" spellcheck="false" />

        <button id="btn-connect" class="btn btn-primary full-width">
          Connect
        </button>

        <div class="status-row">
          <span class="dot" id="conn-dot"></span>
          <span class="status-text" id="conn-label">disconnected</span>
        </div>
      </section>

      <!-- Motor control panel -->
      <section class="panel" id="panel-motors">
        <h2 class="panel-title">Motors</h2>

        <div class="motor-grid">
          <button id="btn-enable" class="btn btn-ok" disabled>Enable</button>
          <button id="btn-disable" class="btn btn-warning" disabled>
            Disable
          </button>
        </div>

        <div class="status-row" style="margin-top: 10px">
          <span
            class="dot"
            id="motor-dot"
            style="background: var(--c-muted)"
          ></span>
          <span class="status-text" id="motor-label">—</span>
        </div>
      </section>
    </aside>

    <!-- ── Main: Teleoperation ── -->
    <main id="main">
      <header class="main-header">
        <h1 class="main-title">Teleoperation</h1>
        <div class="header-actions">
          <button class="btn btn-ghost" onclick="zeroAll()">Zero all</button>
        </div>
      </header>

      <div id="joints-container"></div>

      <!-- Log -->
      <section class="log-section">
        <h2 class="panel-title">Log</h2>
        <div class="log-box" id="log-box"></div>
      </section>
    </main>
  </body>
</html>
